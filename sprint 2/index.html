<!DOCTYPE html>
<html lang="PT-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="page">
    <header>
      <div class="opcoes">
        <button class="flash" aria-label="ativar o flash">
          <img src="./img/flash.png" alt=" icone de flash de camera">
        </button>
        <button class="timer" aria-label="ativa o timer de 3 segundos">
          <img src="./img/relogio.png" alt="icone de relogio/timer">
        </button>
        <button class="info_botao" aria-label="faz aparecer a tela de informações">
          <img src="./img/info.png" alt="icone de informações">
        </button>
      </div>
    </header>

    <main>
      <div class="info">
        <div class="infoFlash">
          <img src="./img/flash.png" alt="icone de flash de camera">
          <p> Ativa a função de flash da camera.</p>
        </div>
        <div class="infoTimer ">
          <img src="./img/relogio.png " alt="icone de relogio/timer">
          <p> Ativa um timer, de ate três segundos.</p>
        </div>
        <div class="infoAcessibilidade">
          <img src="./img/acessibilidade.png" alt="icone de olho">
          <p> Ativa a função de acessibilidade, para ver sons.</p>
        </div>
        <div class="infoGaleria">
          <img src="./img/galeria.png" alt="icone de foto">
          <p> Vê a galeria 
          </p>
        </div>

      </div>


      <div class="roda">
        <img src="./img/roda_acessibilidade.png" alt="a roda de acessibilidade, para ver os sons" >
      </div>
    </main>

    <footer>
      <div class="icons">
        <div class="fundo">
          <button class="acessibilidade" aria-label="ativa a roda de acessibilidade">
            <img src="img/acessibilidade.png" alt="icone de olho">
          </button>
          <button class="foto" aria-label="tira a foto">
            <div></div>
          </button>
          <button class="galeria" aria-label=" abrir a galeria">
            <img src="img/galeria.png" alt="icone de galeria">
          </button>
        </div>
      </div>
    </footer>

  </div>
</body>

</html>
