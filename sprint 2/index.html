<!DOCTYPE html>
<html lang="PT-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="page">
    <header>
      <div class="opcoes">
        <button class="flash">
          <img src="./img/flash.png" alt="">
        </button>
        <button class="timer">
          <img src="./img/relogio.png" alt="">
        </button>
        <button class="info_botao">
          <img src="./img/info.png" alt="">
        </button>
      </div>
    </header>

    <main>
      <div class="info">
        <div class="infoFlash">
          <img src="./img/flash.png" alt="">
          <p> Ativa a função de flash da camera.</p>
        </div>
        <div class="infoTimer ">
          <img src="./img/relogio.png " alt="">
          <p> Ativa um timer, de ate três segundos.</p>
        </div>
        <div class="infoAcessibilidade">
          <img src="./img/acessibilidade.png" alt="">
          <p> Ativa a função de acessibilidade, para ver sons.</p>
        </div>
        <div class="infoGaleria">
          <img src="./img/galeria.png" alt="">
          <p> Vê a galeria 
          </p>
        </div>

      </div>


      <div class="roda">
        <img src="./img/roda_acessibilidade.png" alt="" >
      </div>
    </main>

    <footer>
      <div class="icons">
        <div class="fundo">
          <button class="acessibilidade">
            <img src="img/acessibilidade.png" alt="">
          </button>
          <button class="foto">
            <div></div>
          </button>
          <button class="galeria">
            <img src="img/galeria.png" alt="">
          </button>
        </div>
      </div>
    </footer>

  </div>
</body>

</html>
